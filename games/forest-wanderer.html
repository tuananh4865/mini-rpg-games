<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Forest Wanderer — Mini RPG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a14;
    font-family: 'Courier New', monospace;
    color: #e8e8d8;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game-wrap {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1a2a 0%, #0a0a14 100%);
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 0 0 40px rgba(120, 180, 255, 0.15);
    border: 2px solid #2a2a3a;
    background: #1a1a2a;
  }
  #hud {
    position: absolute;
    top: 12px; left: 12px;
    padding: 10px 14px;
    background: rgba(10, 10, 20, 0.85);
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    min-width: 180px;
  }
  #hud .row { display: flex; justify-content: space-between; gap: 12px; }
  #hud .label { color: #8a8aa8; }
  #hud .val { color: #e8e8d8; font-weight: bold; }
  #hud .val.hp-low { color: #ff6b6b; }
  #hud .val.hp-mid { color: #ffd166; }
  #hud .val.hp-full { color: #6bcf7a; }

  #dialog {
    position: absolute;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    width: min(640px, 92vw);
    padding: 16px 20px;
    background: rgba(10, 10, 20, 0.92);
    border: 1px solid #5a5a8a;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #dialog .speaker { color: #ffd166; font-weight: bold; margin-bottom: 6px; font-size: 13px; }
  #dialog .text { color: #e8e8d8; }
  #dialog .hint { color: #6a6a8a; font-size: 11px; margin-top: 8px; text-align: right; }

  #controls {
    position: absolute;
    bottom: 12px; right: 12px;
    padding: 8px 12px;
    background: rgba(10, 10, 20, 0.7);
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.5;
    color: #8a8aa8;
    text-align: right;
  }
  #controls kbd {
    display: inline-block;
    padding: 1px 6px;
    margin: 0 2px;
    background: #2a2a3a;
    border: 1px solid #4a4a6a;
    border-radius: 3px;
    color: #e8e8d8;
    font-family: inherit;
    font-size: 10px;
  }

  #toast {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 14px 24px;
    background: rgba(10, 10, 20, 0.95);
    border: 1px solid #6bcf7a;
    border-radius: 6px;
    color: #6bcf7a;
    font-size: 14px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #toast.show { opacity: 1; }

  #title-screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10, 10, 20, 0.95);
    z-index: 10;
    transition: opacity 0.5s;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }
  #title-screen h1 {
    font-size: 36px; color: #ffd166;
    text-shadow: 0 0 20px rgba(255, 209, 102, 0.4);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  #title-screen .sub { color: #8a8aa8; font-size: 13px; margin-bottom: 32px; }
  #title-screen .start-hint {
    padding: 12px 24px;
    border: 1px solid #ffd166;
    border-radius: 6px;
    color: #ffd166;
    animation: pulse 1.5s ease-in-out infinite;
    font-size: 14px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.98); }
  }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game" width="640" height="480"></canvas>

  <div id="hud">
    <div class="row"><span class="label">❤️ HP</span><span class="val hp-full" id="hp">100/100</span></div>
    <div class="row"><span class="label">⭐ Lv</span><span class="val" id="lv">1</span></div>
    <div class="row"><span class="label">💰</span><span class="val" id="gold">0</span></div>
    <div class="row"><span class="label">📍</span><span class="val" id="loc">Forest</span></div>
  </div>

  <div id="dialog">
    <div class="speaker" id="dlg-speaker"></div>
    <div class="text" id="dlg-text"></div>
    <div class="hint">[Space] Tiếp tục • [Esc] Đóng</div>
  </div>

  <div id="controls">
    <div><kbd>WASD</kbd> / <kbd>↑↓←→</kbd> di chuyển</div>
    <div><kbd>Space</kbd> / <kbd>E</kbd> tương tác</div>
    <div><kbd>Shift</kbd> dash</div>
  </div>

  <div id="toast"></div>

  <div id="title-screen">
    <h1>FOREST WANDERER</h1>
    <div class="sub">A Mini RPG · Made by Tuấn Anh's AI</div>
    <div class="start-hint">Nhấn [Space] hoặc [Enter] để bắt đầu</div>
  </div>
</div>

<script>
'use strict';

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TILE = 32;

// ============ INPUT ============
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (!keys[k]) justPressed[k] = true;
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function consumePress(k) {
  if (justPressed[k]) { justPressed[k] = false; return true; }
  return false;
}

// ============ WORLD ============
// Tile types: 0=grass, 1=tree, 2=water, 3=path, 4=wall(building), 5=flower
const WORLD_W = 40, WORLD_H = 30;
const world = [];
const buildings = []; // {x, y, w, h, color, name, doorX, doorY, interiorId}

// Generate simple procedural forest
function generateWorld() {
  for (let y = 0; y < WORLD_H; y++) {
    world[y] = [];
    for (let x = 0; x < WORLD_W; x++) {
      // Base grass
      let t = 0;
      // Border trees
      if (x === 0 || x === WORLD_W-1 || y === 0 || y === WORLD_H-1) t = 1;
      // Random trees (sparse)
      else if (Math.random() < 0.08) t = 1;
      // Flowers
      else if (Math.random() < 0.03) t = 5;
      world[y][x] = t;
    }
  }

  // Carve a path
  for (let x = 5; x < 35; x++) world[15][x] = 3;
  for (let y = 15; y < 25; y++) world[y][20] = 3;

  // Lake
  for (let y = 5; y < 10; y++)
    for (let x = 28; x < 35; x++)
      world[y][x] = 2;

  // Building 1: Shop (top-left)
  createBuilding(4, 4, 5, 4, '#8b4513', 'Shop', 6, 7);
  // Building 2: House (right side)
  createBuilding(15, 22, 5, 4, '#654321', 'Nhà Cụ Già', 17, 25);
  // Building 3: Tower (bottom)
  createBuilding(30, 22, 4, 5, '#3a3a5a', 'Tháp Bí Ẩn', 31, 26);
}

function createBuilding(x, y, w, h, color, name, doorX, doorY) {
  for (let dy = 0; dy < h; dy++)
    for (let dx = 0; dx < w; dx++)
      world[y+dy][x+dx] = 4;
  buildings.push({ x, y, w, h, color, name, doorX, doorY });
}

generateWorld();

// ============ ENTITIES ============
const player = {
  x: 20 * TILE + TILE/2, y: 18 * TILE + TILE/2,
  vx: 0, vy: 0,
  speed: 110, // px/s
  dir: 'down', // up/down/left/right
  moving: false,
  hp: 100, maxHp: 100,
  lv: 1, exp: 0, gold: 0,
  attackCooldown: 0,
  dashCooldown: 0,
  invuln: 0,
  animFrame: 0, animTimer: 0,
  attackFrame: 0,
  hitFlash: 0,
};

const npcs = [
  { id: 'npc1', x: 10*TILE+16, y: 5*TILE+16, color: '#ff6b9d', name: 'Cô Bán Hoa',
    dialogue: ['Chào mấy con vợ!', 'Tui bán hoa tươi nè, mua không?', 'Mua 5 bó tặng 1 bó nha!'] },
  { id: 'npc2', x: 25*TILE+16, y: 8*TILE+16, color: '#6bcf7a', name: 'Chú Thợ Săn',
    dialogue: ['Đừng đi vào rừng sâu một mình!', 'Có slime ở đó đó.', 'Mua kiếm không? Giá rẻ.'] },
  { id: 'npc3', x: 17*TILE+16, y: 28*TILE+16, color: '#a78bfa', name: 'Phù Thủy',
    dialogue: ['Hmm... ngươi có căn cơ đó.', 'Ta có thể dạy ngươi phép thuật.', 'Nhưng phải mang cho ta 50 vàng trước.'] },
];

const enemies = []; // slimes spawn on map
let slimeSpawnTimer = 0;

function spawnSlime() {
  // Spawn at random grass tile far from player
  for (let attempt = 0; attempt < 20; attempt++) {
    const x = Math.floor(Math.random() * WORLD_W);
    const y = Math.floor(Math.random() * WORLD_H);
    if (world[y][x] !== 0) continue;
    const px = x*TILE+16, py = y*TILE+16;
    const dx = px - player.x, dy = py - player.y;
    if (Math.sqrt(dx*dx + dy*dy) < 200) continue;
    enemies.push({
      x: px, y: py, vx: 0, vy: 0,
      hp: 30, maxHp: 30, atk: 8,
      speed: 40, dirTimer: 0, dirX: 0, dirY: 0,
      hitFlash: 0, attackCooldown: 0, animTimer: 0,
    });
    return;
  }
}

const pickups = []; // coins, hearts dropped by enemies
function spawnPickup(x, y, type) {
  pickups.push({ x, y, type, vy: -80, life: 8 });
}

// ============ CAMERA ============
const camera = { x: 0, y: 0 };
function updateCamera() {
  camera.x = player.x - W/2;
  camera.y = player.y - H/2;
  camera.x = Math.max(0, Math.min(WORLD_W*TILE - W, camera.x));
  camera.y = Math.max(0, Math.min(WORLD_H*TILE - H, camera.y));
}

// ============ HELPERS ============
function isBlocked(px, py, radius=12) {
  // Check 4 corners of bounding box
  const corners = [
    [px - radius, py - radius],
    [px + radius, py - radius],
    [px - radius, py + radius],
    [px + radius, py + radius],
  ];
  for (const [cx, cy] of corners) {
    const tx = Math.floor(cx / TILE);
    const ty = Math.floor(cy / TILE);
    if (tx < 0 || tx >= WORLD_W || ty < 0 || ty >= WORLD_H) return true;
    const t = world[ty][tx];
    if (t === 1 || t === 2 || t === 4) return true;
  }
  return false;
}

function distance(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx*dx + dy*dy);
}

let titleScreenVisible = true;
let dialogQueue = [];
let currentDialog = null;
let gameStarted = false;
let toastTimer = 0;

function showToast(text, duration=1.5) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  toastTimer = duration;
}

function startDialogue(speaker, lines) {
  dialogQueue = lines.slice();
  currentDialog = { speaker, index: 0 };
  document.getElementById('dialog').style.display = 'block';
  document.getElementById('dlg-speaker').textContent = speaker;
  document.getElementById('dlg-text').textContent = lines[0];
}

function advanceDialogue() {
  if (!currentDialog) return;
  currentDialog.index++;
  if (currentDialog.index >= dialogQueue.length) {
    closeDialogue();
    return;
  }
  document.getElementById('dlg-text').textContent = dialogQueue[currentDialog.index];
}

function closeDialogue() {
  currentDialog = null;
  document.getElementById('dialog').style.display = 'none';
}

// ============ UPDATE ============
function update(dt) {
  // Title screen
  if (titleScreenVisible) {
    if (consumePress(' ') || consumePress('enter')) {
      titleScreenVisible = false;
      document.getElementById('title-screen').classList.add('hidden');
      gameStarted = true;
      showToast('Chào mừng anh đến Forest Wanderer!', 2.5);
    }
    return;
  }

  // Dialog mode
  if (currentDialog) {
    if (consumePress(' ') || consumePress('enter') || consumePress('e')) advanceDialogue();
    else if (consumePress('escape')) closeDialogue();
    return;
  }

  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  // Dash
  const dashing = keys['shift'] && player.dashCooldown <= 0 && (dx !== 0 || dy !== 0);
  const speedMul = dashing ? 2.2 : 1;

  if (dx !== 0 || dy !== 0) {
    // Normalize
    const len = Math.sqrt(dx*dx + dy*dy);
    dx /= len; dy /= len;
    if (dashing) player.dashCooldown = 1.2;

    // Determine direction
    if (Math.abs(dx) > Math.abs(dy)) player.dir = dx > 0 ? 'right' : 'left';
    else player.dir = dy > 0 ? 'down' : 'up';
    player.moving = true;
  } else {
    player.moving = false;
  }

  // Move with axis-separated collision
  const moveSpeed = player.speed * speedMul * dt;
  const newX = player.x + dx * moveSpeed;
  if (!isBlocked(newX, player.y)) player.x = newX;
  const newY = player.y + dy * moveSpeed;
  if (!isBlocked(player.x, newY)) player.y = newY;

  // Cooldowns
  if (player.dashCooldown > 0) player.dashCooldown -= dt;
  if (player.attackCooldown > 0) player.attackCooldown -= dt;
  if (player.invuln > 0) player.invuln -= dt;
  if (player.hitFlash > 0) player.hitFlash -= dt;

  // Attack (Space or E when not near NPC)
  if ((consumePress(' ') || consumePress('e')) && player.attackCooldown <= 0) {
    player.attackCooldown = 0.5;
    player.attackFrame = 0.3;
    // Hit enemies in front of player
    const atkRange = 28;
    const atkDir = { up: [0,-1], down: [0,1], left: [-1,0], right: [1,0] }[player.dir];
    for (const e of enemies) {
      const ddx = e.x - player.x, ddy = e.y - player.y;
      const dist = Math.sqrt(ddx*ddx + ddy*ddy);
      // Check if in front cone
      const dot = (ddx*atkDir[0] + ddy*atkDir[1]) / Math.max(dist, 1);
      if (dist < atkRange && dot > 0.5) {
        e.hp -= 18 + player.lv * 2;
        e.hitFlash = 0.2;
        // Knockback
        e.vx = atkDir[0] * 200;
        e.vy = atkDir[1] * 200;
        if (e.hp <= 0) {
          spawnPickup(e.x, e.y, Math.random() < 0.7 ? 'coin' : 'heart');
          player.exp += 5;
          if (player.exp >= player.lv * 20) {
            player.lv++;
            player.exp = 0;
            player.maxHp += 10;
            player.hp = player.maxHp;
            showToast(`⬆ Lv ${player.lv}! HP tăng!`, 2);
          }
        }
      }
    }
  }

  // Animation
  if (player.moving) {
    player.animTimer += dt * (dashing ? 12 : 7);
    if (player.animTimer >= 1) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 4;
    }
  } else {
    player.animFrame = 0;
  }
  if (player.attackFrame > 0) player.attackFrame -= dt;

  // NPC interaction
  for (const npc of npcs) {
    const d = distance(player, npc);
    if (d < 36) {
      if (consumePress('e') || consumePress(' ')) {
        startDialogue(npc.name, npc.dialogue);
      }
    }
  }

  // Building door interaction
  for (const b of buildings) {
    if (player.x > b.x*TILE && player.x < (b.x+b.w)*TILE &&
        player.y > b.y*TILE && player.y < (b.y+b.h)*TILE) {
      // Inside building — show "inside" indicator
      // For simplicity, no interior, just show toast
      if (!b._entered) {
        b._entered = true;
        if (b.name === 'Shop') {
          showToast('🛒 SHOP — Bán đồ (coming soon)', 1.5);
        } else if (b.name === 'Nhà Cụ Già') {
          showToast('🏠 Đang trong nhà... NPC soon', 1.5);
        } else if (b.name === 'Tháp Bí Ẩn') {
          showToast('🗼 Tháp bí ẩn... Boss soon', 1.5);
        }
      }
    } else {
      b._entered = false;
    }
  }

  // Slime spawn
  slimeSpawnTimer -= dt;
  if (slimeSpawnTimer <= 0 && enemies.length < 8) {
    spawnSlime();
    slimeSpawnTimer = 3 + Math.random() * 3;
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.hp <= 0) { enemies.splice(i, 1); continue; }

    // AI: pick direction every 1-2s
    e.dirTimer -= dt;
    if (e.dirTimer <= 0) {
      e.dirTimer = 1 + Math.random() * 1.5;
      // Chase player if close
      const d = distance(e, player);
      if (d < 200) {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        e.dirX = Math.cos(ang);
        e.dirY = Math.sin(ang);
      } else {
        const ang = Math.random() * Math.PI * 2;
        e.dirX = Math.cos(ang);
        e.dirY = Math.sin(ang);
      }
    }

    // Move
    const sp = e.speed * dt;
    const nx = e.x + (e.dirX * sp + e.vx * dt);
    const ny = e.y + (e.dirY * sp + e.vy * dt);
    if (!isBlocked(nx, e.y, 10)) e.x = nx;
    if (!isBlocked(e.x, ny, 10)) e.y = ny;
    e.vx *= 0.85; e.vy *= 0.85;

    // Animation
    e.animTimer += dt * 5;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    // Attack player on contact
    const d = distance(e, player);
    if (d < 22 && player.invuln <= 0) {
      player.hp -= e.atk;
      player.invuln = 0.8;
      player.hitFlash = 0.3;
      // Knockback player
      const ang = Math.atan2(player.y - e.y, player.x - e.x);
      player.x += Math.cos(ang) * 30;
      player.y += Math.sin(ang) * 30;
      if (player.hp <= 0) {
        player.hp = player.maxHp;
        player.x = 20*TILE+16; player.y = 18*TILE+16;
        player.gold = Math.floor(player.gold * 0.5);
        showToast('💀 Anh đã gục! Respawn...', 2);
      }
    }
  }

  // Update pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    p.vy += 200 * dt;
    p.y += p.vy * dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    // Pickup
    if (distance(p, player) < 20) {
      if (p.type === 'coin') {
        player.gold += 5 + Math.floor(Math.random() * 10);
        showToast('+' + (5 + Math.floor(Math.random() * 10)) + ' 💰');
      } else if (p.type === 'heart') {
        player.hp = Math.min(player.maxHp, player.hp + 20);
        showToast('+20 ❤️');
      }
      pickups.splice(i, 1);
    }
  }

  // Toast
  if (toastTimer > 0) {
    toastTimer -= dt;
    if (toastTimer <= 0) document.getElementById('toast').classList.remove('show');
  }

  updateCamera();
  updateHUD();
}

// ============ RENDER ============
function drawTile(tx, ty, t) {
  const px = tx * TILE - camera.x;
  const py = ty * TILE - camera.y;
  if (px < -TILE || px > W || py < -TILE || py > H) return;

  switch (t) {
    case 0: // grass
      ctx.fillStyle = '#3d5a3d';
      ctx.fillRect(px, py, TILE, TILE);
      // grass detail
      if ((tx + ty) % 3 === 0) {
        ctx.fillStyle = '#4a6a4a';
        ctx.fillRect(px + 4, py + 4, 2, 2);
        ctx.fillRect(px + 20, py + 18, 2, 2);
      }
      break;
    case 1: // tree
      ctx.fillStyle = '#3d5a3d';
      ctx.fillRect(px, py, TILE, TILE);
      // trunk
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(px + 12, py + 20, 8, 12);
      // canopy
      ctx.fillStyle = '#2d4a2d';
      ctx.beginPath();
      ctx.arc(px + 16, py + 14, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3d6a3d';
      ctx.beginPath();
      ctx.arc(px + 13, py + 11, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + 20, py + 13, 4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 2: // water
      ctx.fillStyle = '#2a5a8a';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#3a7aaa';
      ctx.fillRect(px + 4, py + 6, 6, 2);
      ctx.fillRect(px + 18, py + 14, 6, 2);
      ctx.fillRect(px + 8, py + 24, 8, 2);
      break;
    case 3: // path
      ctx.fillStyle = '#8a7a5a';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(px + 8, py + 8, 4, 4);
      ctx.fillRect(px + 22, py + 18, 3, 3);
      break;
    case 4: // building
      ctx.fillStyle = '#3d5a3d';
      ctx.fillRect(px, py, TILE, TILE);
      // Wall
      ctx.fillStyle = '#5a4a3a';
      ctx.fillRect(px + 2, py + 2, TILE-4, TILE-4);
      // Roof ridge (top row only)
      if (ty === 4 || ty === 22) {
        ctx.fillStyle = '#8a3a1a';
        ctx.fillRect(px + 2, py + 2, TILE-4, 6);
      }
      break;
    case 5: // flower
      ctx.fillStyle = '#3d5a3d';
      ctx.fillRect(px, py, TILE, TILE);
      const colors = ['#ff6b9d', '#ffd166', '#a78bfa', '#6bcf7a'];
      ctx.fillStyle = colors[(tx*7 + ty*13) % 4];
      ctx.beginPath();
      ctx.arc(px + 16, py + 16, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffd166';
      ctx.beginPath();
      ctx.arc(px + 16, py + 16, 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

function drawBuilding(b) {
  // Door indicator (when player nearby)
  const dx = player.x - b.doorX * TILE;
  const dy = player.y - b.doorY * TILE;
  if (Math.sqrt(dx*dx + dy*dy) < 60) {
    const px = b.doorX * TILE - camera.x;
    const py = b.doorY * TILE - camera.y;
    ctx.fillStyle = 'rgba(255, 209, 102, 0.8)';
    ctx.fillRect(px + 8, py + 8, 16, 16);
    ctx.fillStyle = '#ffd166';
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('E', px + 16, py + 20);
  }
  // Label
  const px = b.x * TILE - camera.x;
  const py = b.y * TILE - camera.y;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(px, py - 14, b.w * TILE, 12);
  ctx.fillStyle = '#e8e8d8';
  ctx.font = 'bold 10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, px + (b.w * TILE)/2, py - 4);
}

function drawPlayer() {
  const px = player.x - camera.x;
  const py = player.y - camera.y;

  // Hit flash
  const flashing = player.invuln > 0 && Math.floor(player.invuln * 10) % 2 === 0;
  if (flashing) return;

  ctx.save();
  ctx.translate(px, py);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 12, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (16x16 sprite scaled)
  const f = player.animFrame;
  const bobY = player.moving ? Math.sin(f * Math.PI / 2) * 1.5 : 0;

  // Cape (back layer)
  ctx.fillStyle = '#8a3a1a';
  ctx.fillRect(-6, -8 + bobY, 12, 14);

  // Body
  ctx.fillStyle = '#4a6aaa'; // blue tunic
  ctx.fillRect(-5, -6 + bobY, 10, 10);

  // Legs
  const legOffset = player.moving ? (f % 2 === 0 ? 1 : -1) : 0;
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(-4, 4 + bobY, 3, 6 + legOffset);
  ctx.fillRect(1, 4 + bobY, 3, 6 - legOffset);

  // Head
  ctx.fillStyle = '#ffd9a8';
  ctx.fillRect(-4, -12 + bobY, 8, 8);

  // Hair
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(-4, -13 + bobY, 8, 3);

  // Eyes (face direction)
  ctx.fillStyle = '#000';
  if (player.dir === 'down') {
    ctx.fillRect(-2, -8 + bobY, 1, 1);
    ctx.fillRect(1, -8 + bobY, 1, 1);
  } else if (player.dir === 'up') {
    // Hair covers eyes
  } else if (player.dir === 'left') {
    ctx.fillRect(-3, -8 + bobY, 1, 1);
  } else if (player.dir === 'right') {
    ctx.fillRect(2, -8 + bobY, 1, 1);
  }

  // Attack animation
  if (player.attackFrame > 0) {
    ctx.fillStyle = '#e8e8d8';
    const atkPos = {
      up:    [-2, -22, 4, 12],
      down:  [-2, 6, 4, 12],
      left:  [-22, -2, 12, 4],
      right: [6, -2, 12, 4],
    }[player.dir];
    ctx.fillRect(atkPos[0], atkPos[1], atkPos[2], atkPos[3]);
    // Sword tip
    ctx.fillStyle = '#ffd166';
    if (player.dir === 'up') ctx.fillRect(-1, -26, 2, 4);
    else if (player.dir === 'down') ctx.fillRect(-1, 18, 2, 4);
    else if (player.dir === 'left') ctx.fillRect(-26, -1, 4, 2);
    else ctx.fillRect(22, -1, 4, 2);
  }

  ctx.restore();
}

function drawNPC(npc) {
  const px = npc.x - camera.x;
  const py = npc.y - camera.y;
  if (px < -TILE || px > W || py < -TILE || py > H) return;

  // Near player highlight
  const d = distance(player, npc);
  const nearby = d < 36;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px, py + 12, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = npc.color;
  ctx.fillRect(px - 5, py - 6, 10, 10);
  // Head
  ctx.fillStyle = '#ffd9a8';
  ctx.fillRect(px - 4, py - 12, 8, 8);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(px - 2, py - 8, 1, 1);
  ctx.fillRect(px + 1, py - 8, 1, 1);

  // Name label
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(px - 30, py - 28, 60, 14);
  ctx.fillStyle = '#e8e8d8';
  ctx.font = 'bold 10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(npc.name, px, py - 18);

  if (nearby) {
    ctx.fillStyle = '#ffd166';
    ctx.fillText('[E] Nói chuyện', px, py - 8);
  }
}

function drawEnemy(e) {
  const px = e.x - camera.x;
  const py = e.y - camera.y;
  if (px < -TILE || px > W || py < -TILE || py > H) return;

  // Hit flash
  if (e.hitFlash > 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = '#7ad06a';
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px, py + 10, 9, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Slime body (bouncing)
  const bounce = Math.sin(e.animTimer) * 1.5;
  ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#7ad06a';
  ctx.beginPath();
  ctx.ellipse(px, py - 2 + bounce, 10, 8 + bounce, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#a8e89a';
  ctx.beginPath();
  ctx.ellipse(px - 3, py - 5 + bounce, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(px - 3, py - 3 + bounce, 2, 2);
  ctx.fillRect(px + 2, py - 3 + bounce, 2, 2);

  // HP bar
  if (e.hp < e.maxHp) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(px - 12, py - 16, 24, 3);
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(px - 12, py - 16, 24 * (e.hp / e.maxHp), 3);
  }
}

function drawPickup(p) {
  const px = p.x - camera.x;
  const py = p.y - camera.y;
  if (px < -TILE || px > W || py < -TILE || py > H) return;
  ctx.fillStyle = p.type === 'coin' ? '#ffd166' : '#ff6b9d';
  ctx.beginPath();
  ctx.arc(px, py, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = p.type === 'coin' ? '#ffaa00' : '#ff3377';
  ctx.beginPath();
  ctx.arc(px, py, 3, 0, Math.PI * 2);
  ctx.fill();
}

function render() {
  // Clear with grass color
  ctx.fillStyle = '#3d5a3d';
  ctx.fillRect(0, 0, W, H);

  // Tiles
  const startTX = Math.max(0, Math.floor(camera.x / TILE));
  const startTY = Math.max(0, Math.floor(camera.y / TILE));
  const endTX = Math.min(WORLD_W, Math.ceil((camera.x + W) / TILE) + 1);
  const endTY = Math.min(WORLD_H, Math.ceil((camera.y + H) / TILE) + 1);
  for (let y = startTY; y < endTY; y++)
    for (let x = startTX; x < endTX; x++)
      drawTile(x, y, world[y][x]);

  // Buildings (labels)
  for (const b of buildings) drawBuilding(b);

  // Pickups
  for (const p of pickups) drawPickup(p);

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // NPCs
  for (const npc of npcs) drawNPC(npc);

  // Player
  drawPlayer();
}

// ============ HUD ============
function updateHUD() {
  const hpEl = document.getElementById('hp');
  hpEl.textContent = `${player.hp}/${player.maxHp}`;
  hpEl.className = 'val ' + (
    player.hp < player.maxHp * 0.3 ? 'hp-low' :
    player.hp < player.maxHp * 0.7 ? 'hp-mid' : 'hp-full'
  );
  document.getElementById('lv').textContent = player.lv;
  document.getElementById('gold').textContent = player.gold;
}

// ============ MAIN LOOP ============
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

</script>
</body>
</html>
